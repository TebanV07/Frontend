<div class="message-bubble" [ngClass]="{'sent': isSent, 'received': !isSent}"
     (mousedown)="onMouseDown()" (mouseup)="onMouseUp()"
     (touchstart)="onTouchStart()" (touchend)="onTouchEnd()"
     (contextmenu)="onContextMenu($event)">

  <!-- Menú de acciones (long press / clic derecho) -->
  <div class="action-menu" *ngIf="showActions">
    <button *ngIf="isSent" (click)="actionEdit()" class="action-item">✏️ Editar</button>
    <button (click)="actionDeleteForMe()" class="action-item">🗑️ Eliminar para mí</button>
    <button (click)="actionDeleteForAll()" class="action-item">🚫 Eliminar para todos</button>
    <button (click)="actionForward()" class="action-item">🔁 Reenviar</button>
    <button (click)="actionShare()" class="action-item">📤 Compartir</button>
    <button (click)="closeActions()" class="action-item close">✖️ Cerrar</button>
  </div>

  <!-- Contenedor del mensaje -->
  <div class="message-content">

    <!-- ✅ FIX: eliminada condición has_media para que funcione con URLs locales -->
    <div *ngIf="message.media_urls?.length" class="media-container">
      <ng-container *ngFor="let url of message.media_urls">
        <img *ngIf="message.media_type === 'image'" [src]="url" class="media-image" (error)="$any($event.target).style.display='none'">
        <video *ngIf="message.media_type === 'video'" [src]="url" controls class="media-video"></video>
        <audio *ngIf="message.media_type === 'audio'" [src]="url" controls class="media-audio"></audio>
        <a *ngIf="message.media_type === 'file'" [href]="url" target="_blank" class="file-link">📎 Archivo adjunto</a>
      </ng-container>
    </div>

    <!-- ✅ FIX: eliminado el bloque .message-header con avatar (solo queda en el sidebar) -->

    <!-- Controles de edición/eliminación (para mensajes propios) -->
    <div class="message-controls" *ngIf="isSent && !message.media_urls?.length">
      <button class="ctrl-btn edit" (click)="startEdit()" title="Editar mensaje">✏️</button>
      <button class="ctrl-btn delete" (click)="deleteMessage()" title="Eliminar mensaje">🗑️</button>
    </div>

    <!-- Texto o formulario de edición del mensaje -->
    <div class="message-text" *ngIf="message.content">
      <ng-container *ngIf="!isEditing; else editForm">
        <!-- Mostrar siempre el texto original -->
        <p>{{ message.content }}</p>

        <!-- Lista de idiomas traducidos guardados -->
        <div class="translation-langs" *ngIf="translationLanguages.length > 0">
          <span
            *ngFor="let lang of translationLanguages"
            class="saved-lang"
            [class.selected]="currentTranslationLang === lang"
            (click)="selectTranslation(lang)">
            {{ lang.toUpperCase() }}
          </span>
        </div>

        <!-- Mostrar traducción debajo si está activada y disponible -->
        <p *ngIf="showTranslation && translatedContent" class="translated-text">
          {{ translatedContent }}
        </p>
      </ng-container>

      <ng-template #editForm>
        <textarea [(ngModel)]="editContent" class="edit-textarea"></textarea>
        <div class="edit-actions">
          <button (click)="saveEdit()" class="save-btn">Guardar</button>
          <button (click)="cancelEdit()" class="cancel-btn">Cancelar</button>
        </div>
      </ng-template>
    </div>

    <!-- Indicador de traducción (solo si existe traducción) -->
    <div
      *ngIf="hasTranslation()"
      class="translation-indicator"
      (click)="toggleTranslationView()"
      role="button"
      tabindex="0"
      [attr.aria-label]="showTranslation ? 'Ver mensaje original' : 'Ver traducción'">
      <span class="icon">🌐</span>
      <span class="text">{{ showTranslation ? 'Ocultar traducción' : 'Mostrar traducción' }}</span>
    </div>

    <!-- Hora y estado del mensaje -->
    <div class="message-time">
      {{ getMessageTime() }}
      <span *ngIf="isSent && message.is_read" class="read-indicator" title="Leído">✓✓</span>
      <span *ngIf="isSent && !message.is_read" class="unread-indicator" title="Enviado">✓</span>
    </div>
  </div>

  <!-- Botón de traducción (solo para mensajes recibidos) -->
  <div class="message-actions" *ngIf="!isSent">
    <button
      class="translate-btn"
      (click)="toggleLanguageMenu()"
      [disabled]="isTranslating"
      [class.active]="showLanguageMenu"
      title="Traducir mensaje"
      type="button"
      aria-label="Traducir mensaje">
      <span *ngIf="!isTranslating">🌐</span>
      <span *ngIf="isTranslating" class="spinner">⏳</span>
    </button>

    <!-- Menú desplegable de idiomas -->
    <div
      class="language-menu"
      *ngIf="showLanguageMenu"
      role="menu"
      aria-label="Seleccionar idioma">
      <div class="language-menu-header">Traducir a:</div>
      <button
        *ngFor="let lang of availableLanguages"
        class="language-option"
        (click)="onTranslate(lang.code)"
        type="button"
        role="menuitem"
        [attr.aria-label]="'Traducir a ' + lang.name">
        <span class="flag" aria-hidden="true">{{ lang.flag }}</span>
        <span class="name">{{ lang.name }}</span>
      </button>
    </div>
  </div>

  <!-- Mensaje de error de traducción -->
  <div *ngIf="translationError" class="translation-error" role="alert">
    <span class="icon" aria-hidden="true">⚠️</span>
    <span class="text">{{ translationError }}</span>
  </div>

</div>
