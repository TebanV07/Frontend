<div class="message-input-container">
  <!-- Emoji Picker -->
  <div class="emoji-picker" *ngIf="showEmojiPicker">
    <div class="emoji-picker-header">
      <h4>{{ 'chat.input.emojis' | translate }}</h4>
      <button class="close-btn" (click)="toggleEmojiPicker()">✕</button>
    </div>
    <div class="emoji-grid">
      <button
        *ngFor="let emoji of commonEmojis"
        class="emoji-item"
        (click)="addEmoji(emoji)">
        {{ emoji }}
      </button>
    </div>
  </div>

  <!-- Input Principal -->
  <div class="message-input">
    <!-- Botón Adjuntar -->
    <button
      class="attach-btn"
      (click)="onAttachFile()"
      [title]="'chat.input.attach' | translate">
      📎
    </button>
    <!-- Botón Cámara -->
    <button
      class="camera-btn"
      (click)="onTakePhoto()"
      [title]="'chat.input.camera' | translate">
      📷
    </button>
    <!-- Input oculto para seleccionar archivo general -->
    <input #fileInput type="file" style="display:none" accept="image/*,video/*,audio/*" capture="environment" (change)="handleFileInput($event)" />
    <!-- Input oculto para capture de cámara solo imagen -->
    <input #cameraInput type="file" style="display:none" accept="image/*" capture="environment" (change)="handleFileInput($event)" />

    <!-- Input de texto -->
    <input
      type="text"
      [placeholder]="'chat.input.placeholder' | translate"
      [(ngModel)]="newMessage"
      (ngModelChange)="onInputChange()"
      (keyup.enter)="sendMessage()"
      #messageInput
      class="text-input">

    <!-- Botón Emoji -->
    <button
      class="emoji-btn"
      (click)="toggleEmojiPicker()"
      [class.active]="showEmojiPicker"
      [title]="'chat.input.emojis' | translate">
      😊
    </button>

    <!-- Botón Voz (cuando no hay texto) -->
    <button
      *ngIf="!newMessage.trim()"
      class="voice-btn"
      (click)="toggleVoiceRecording()"
      [class.recording]="isRecording"
      [title]="'chat.input.voice' | translate">
      <span class="voice-icon">🎤</span>
    </button>

    <!-- Botón Enviar (cuando hay texto) -->
    <button
      *ngIf="newMessage.trim()"
      class="send-btn"
      (click)="sendMessage()"
      [class.active]="newMessage.trim()"
      [title]="'chat.input.send' | translate">
      <span class="send-icon">➤</span>
    </button>
  </div>

  <!-- Indicador de grabación -->
  <div class="recording-indicator" *ngIf="isRecording">
    <span class="recording-pulse"></span>
    <span class="recording-text">{{ 'chat.input.recording' | translate }}</span>
    <button class="stop-recording-btn" (click)="toggleVoiceRecording()">
      {{ 'chat.input.stopRecording' | translate }}
    </button>
  </div>
</div>
