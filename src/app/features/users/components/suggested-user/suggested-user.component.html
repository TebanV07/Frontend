<div class="suggested-users-container">
  <div class="header">
    <h3>{{ 'explore.suggested.title' | translate }}</h3>
  </div>

  <div class="users-list">
    <div *ngFor="let user of getDisplayedUsers()" class="user-card">
      <img
        [src]="user.avatar || 'assets/default-avatar.png'"
        [alt]="user.username"
        class="user-avatar"
        [routerLink]="['/profile', user.username]">

      <div class="user-info">
        <h4 [routerLink]="['/profile', user.username]">
          {{ getDisplayName(user) }}
        </h4>
        <p class="username">{{ '@' + user.username }}</p>
        <p class="bio" *ngIf="user.bio">{{ user.bio }}</p>
        <p class="mutual" *ngIf="user.mutualFollowersCount && user.mutualFollowersCount > 0">
          {{ 'explore.suggested.mutual' | translate: { count: user.mutualFollowersCount } }}
        </p>
      </div>

      <button
        class="follow-btn"
        [class.following]="user.isFollowing"
        [class.pending]="user.isPendingRequest"
        [disabled]="isLoading[user.id]"
        (click)="toggleFollow(user)">
        {{ getButtonText(user) | translate }}
      </button>
    </div>

    <div class="no-suggestions" *ngIf="suggestedUsers.length === 0">
      <div class="empty-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
      </div>
      <p>{{ 'explore.suggested.empty' | translate }}</p>
    </div>
  </div>

  <button
    *ngIf="suggestedUsers.length > 5"
    class="view-all-btn"
    (click)="toggleShowAll()">
    {{ showAll ? ('explore.suggested.viewLess' | translate) : ('explore.suggested.viewAll' | translate) }}
  </button>
</div>
