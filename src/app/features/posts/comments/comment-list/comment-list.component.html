<div class="comment-list">

  <!-- Formulario nuevo comentario -->
  <div class="new-comment-form">
    <textarea
      [(ngModel)]="newCommentText"
      [placeholder]="'comments.placeholder' | translate"
      rows="2"
      class="comment-textarea"
      [disabled]="isSubmitting">
    </textarea>
    <div class="form-actions">
      <button
        class="submit-btn"
        (click)="submitComment()"
        [disabled]="!newCommentText.trim() || isSubmitting">
        {{ isSubmitting ? ('comments.submitting' | translate) : ('comments.submit' | translate) }}
      </button>
    </div>
  </div>

  <!-- Header -->
  <h3 class="comments-title">
    <span>💬</span>
    {{ 'comments.title' | translate }}
    <span class="count" *ngIf="!isLoading">({{ comments.length }})</span>
  </h3>

  <!-- Loading -->
  <div *ngIf="isLoading" class="loading-state">
    <div class="spinner"></div>
    <span>{{ 'comments.loading' | translate }}</span>
  </div>

  <!-- Error -->
  <div *ngIf="error" class="error-state">⚠️ {{ error }}</div>

  <!-- Vacío -->
  <div *ngIf="!isLoading && !error && comments.length === 0" class="empty-state">
    <div class="empty-icon">💭</div>
    <p>{{ 'comments.empty' | translate }}</p>
  </div>

  <!-- Lista -->
  <div *ngIf="!isLoading && comments.length > 0" class="comments">
    <app-comment-item
      *ngFor="let comment of comments; trackBy: trackByCommentId"
      [comment]="comment"
      [postId]="postId"
      [videoId]="videoId"
      [currentUserId]="currentUserId"
      (replyCreated)="comments.unshift($event)"
      (deleted)="onCommentDeleted($event)">
    </app-comment-item>

    <button
      *ngIf="hasMore"
      class="load-more-btn"
      (click)="loadMore()"
      [disabled]="isLoadingMore">
      {{ isLoadingMore ? ('comments.loadingMore' | translate) : ('comments.loadMore' | translate) }}
    </button>
  </div>

</div>
