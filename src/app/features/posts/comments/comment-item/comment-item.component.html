<div class="comment-item" [class.nested]="isNested">
  <div class="comment-content">
    <div class="comment-bubble">

      <div class="comment-header">
        <div class="user-info">
          <img *ngIf="comment.user?.profile_picture" class="avatar"
               [src]="comment.user?.profile_picture" alt="avatar">
          <div class="avatar-placeholder" *ngIf="!comment.user?.profile_picture">
            {{ comment.user?.username?.charAt(0)?.toUpperCase() }}
          </div>
          <span class="username">{{ comment.user?.username }}</span>
          <span class="language-badge" *ngIf="comment.user?.native_language">
            🌐 {{ comment.user?.native_language }}
          </span>
          <span class="edited-badge" *ngIf="comment.is_edited">· editado</span>
        </div>

        <div class="header-right">
          <span class="timestamp">{{ formattedDate }}</span>

          <!-- Menú 3 puntitos — solo para el autor -->
          <div class="options-menu-wrap" *ngIf="currentUserId === comment.user_id">
            <button class="options-btn" (click)="toggleMenu($event)">⋯</button>
            <div class="options-dropdown" *ngIf="showMenu">
              <button class="option-item" (click)="startEdit()">
                ✏️ Editar
              </button>
              <button class="option-item danger" (click)="deleteThisComment()">
                🗑️ Eliminar
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- Contenido o formulario de edición -->
      <div class="comment-body">
        <ng-container *ngIf="!isEditing; else editForm">
          <p>{{ comment.content }}</p>
        </ng-container>
        <ng-template #editForm>
          <textarea [(ngModel)]="editContent" class="edit-textarea" rows="2"></textarea>
          <div class="edit-actions">
            <button (click)="saveEdit()" class="save-btn">Guardar</button>
            <button (click)="cancelEdit()" class="cancel-btn">Cancelar</button>
          </div>
        </ng-template>
      </div>
    </div>

    <!-- Acciones del comentario -->
    <div class="comment-actions">
      <button class="action-btn like-btn" [class.liked]="comment.is_liked" (click)="toggleCommentLike()">
        <span>{{ comment.is_liked ? '❤️' : '🤍' }}</span>
        <span class="count" *ngIf="(comment.likes_count ?? 0) > 0">{{ comment.likes_count }}</span>
      </button>

      <button class="action-btn reply-btn" (click)="toggleReplyForm()" [class.active]="isReplying">
        <span>💬</span>
        <span>Responder</span>
      </button>

      <button *ngIf="hasReplies" class="action-btn replies-btn" (click)="toggleReplies()">
        <span>{{ showReplies ? '▼' : '▶' }}</span>
        <span>{{ comment.replies_count }} {{ comment.replies_count === 1 ? 'respuesta' : 'respuestas' }}</span>
      </button>
    </div>

    <!-- Formulario de respuesta -->
    <div *ngIf="isReplying" class="reply-form-container">
      <app-comment-form
        [postId]="postId"
        [videoId]="videoId"
        [parentCommentId]="comment.id"
        [placeholder]="'Responder a @' + comment.user?.username"
        (commentCreated)="onReplyCreated($any($event))"
        (cancelled)="toggleReplyForm()">
      </app-comment-form>
    </div>

    <!-- Respuestas anidadas -->
    <div *ngIf="showReplies && comment.replies?.length" class="replies-container">
      <app-comment-item
        *ngFor="let reply of comment.replies"
        [comment]="reply"
        [postId]="postId"
        [videoId]="videoId"
        [currentUserId]="currentUserId"
        [isNested]="true">
      </app-comment-item>
    </div>
  </div>
</div>
