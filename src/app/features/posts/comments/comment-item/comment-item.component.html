<div class="comment-item" [class.deleted]="comment.is_deleted">
  <img 
    [src]="comment.author?.avatar_url || '/assets/default-avatar.png'" 
    [alt]="comment.author?.username"
    class="avatar"
  >

  <div class="comment-content">
    <div class="comment-header">
      <span class="username">{{ comment.author?.username }}</span>
      <span class="full-name" *ngIf="comment.author?.full_name">
        {{ comment.author?.full_name }}
      </span>
      <span class="timestamp">• {{ formattedDate }}</span>
      <span class="edited" *ngIf="comment.updated_at">(edited)</span>
    </div>

    <div class="comment-body" *ngIf="!isEditing">
      <p>{{ comment.content }}</p>
    </div>

    <div class="comment-edit" *ngIf="isEditing">
      <textarea 
        [(ngModel)]="editContent"
        class="edit-textarea"
        rows="3"
      ></textarea>
      <div class="edit-actions">
        <button class="btn btn-cancel" (click)="cancelEditing()">Cancel</button>
        <button class="btn btn-primary" (click)="saveEdit()">Save</button>
      </div>
    </div>

    <div class="comment-actions" *ngIf="!isEditing">
      <button class="action-btn" (click)="toggleReplyForm()">Reply</button>
      
      <button 
        class="action-btn" 
        (click)="startEditing()"
        *ngIf="isOwnComment"
      >
        Edit
      </button>
      
      <button 
        class="action-btn danger" 
        (click)="deleteComment()"
        [disabled]="isDeleting"
        *ngIf="isOwnComment"
      >
        {{ isDeleting ? 'Deleting...' : 'Delete' }}
      </button>

      <button 
        class="action-btn" 
        (click)="toggleReplies()"
        *ngIf="hasReplies"
      >
        {{ showReplies ? 'Hide' : 'Show' }} {{ comment.replies_count }} 
        {{ comment.replies_count === 1 ? 'reply' : 'replies' }}
      </button>
    </div>

    <div class="reply-form" *ngIf="isReplying">
      <app-comment-form
        [postId]="postId"
        [parentCommentId]="comment.id"
        [placeholder]="'Reply to ' + comment.author?.username"
        [autoFocus]="true"
        (commentCreated)="onReplyCreated($event)"
        (cancelled)="toggleReplyForm()"
      ></app-comment-form>
    </div>

    <div class="replies" *ngIf="showReplies && comment.replies && comment.replies.length > 0">
      <app-comment-item
        *ngFor="let reply of comment.replies"
        [comment]="reply"
        [postId]="postId"
        [currentUserId]="currentUserId"
        (commentDeleted)="commentDeleted.emit($event)"
        (commentUpdated)="commentUpdated.emit($event)"
        (replyCreated)="replyCreated.emit($event)"
      ></app-comment-item>
    </div>
  </div>
</div>
