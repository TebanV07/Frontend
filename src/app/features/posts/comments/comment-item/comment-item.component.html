<div class="comment-item">
  <div class="comment-content">
    <div class="comment-bubble">
      <div class="comment-header">
        <div class="user-info">
          <span class="username">{{ comment.author?.username }}</span>
          <span class="language-badge" *ngIf="comment.author?.native_language">
            <span class="icon">🌐</span>
            {{ comment.author?.native_language }}
          </span>
        </div>
        <span class="timestamp">{{ formattedDate }}</span>
      </div>

      <div class="comment-body">
        <p>{{ comment.content }}</p>
      </div>
    </div>

    <div class="comment-actions">
      <!-- Botón de like -->
      <button 
        class="action-btn like-btn"
        [class.liked]="comment.is_liked"
        (click)="toggleCommentLike()"
        [attr.aria-label]="comment.is_liked ? 'Unlike comment' : 'Like comment'"
      >
        <span class="icon">{{ comment.is_liked ? '❤️' : '🤍' }}</span>
        <span class="count" *ngIf="(comment.likes_count ?? 0) > 0">{{ comment.likes_count }}</span>
        <span class="label">{{ comment.is_liked ? 'Liked' : 'Like' }}</span>
      </button>

      <!-- Botón de reply -->
      <button 
        class="action-btn reply-btn" 
        (click)="toggleReplyForm()"
        [class.active]="isReplying"
      >
        <span class="icon">💬</span>
        <span class="label">Reply</span>
      </button>

      <!-- Botón para ver respuestas -->
      <button 
        *ngIf="hasReplies" 
        class="action-btn replies-btn"
        [class.active]="showReplies"
        (click)="toggleReplies()"
      >
        <span class="icon">{{ showReplies ? '▼' : '▶' }}</span>
        <span class="label">{{ comment.replies_count ?? 0 }} {{ (comment.replies_count ?? 0) === 1 ? 'reply' : 'replies' }}</span>
      </button>
    </div>

    <!-- Formulario de respuesta -->
    <div *ngIf="isReplying" class="reply-form-container">
      <app-comment-form
        [postId]="postId"
        [parentCommentId]="comment.id"
        [placeholder]="'Reply to @' + comment.author?.username"
        (commentCreated)="onReplyCreated($any($event))"
        (cancelled)="toggleReplyForm()"
      ></app-comment-form>
    </div>

    <!-- Respuestas anidadas -->
    <div *ngIf="showReplies && hasReplies" class="replies-container">
      <div class="replies-list">
        <app-comment-item
          *ngFor="let reply of comment.replies"
          [comment]="reply"
          [postId]="postId"
          [currentUserId]="currentUserId"
          [isNested]="true"
        ></app-comment-item>
      </div>
    </div>
  </div>
</div>
