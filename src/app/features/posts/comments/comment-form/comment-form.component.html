<form class="comment-form" (ngSubmit)="onSubmit()">
  <div class="form-group">
    <textarea
      #textarea
      [(ngModel)]="content"
      name="content"
      [placeholder]="placeholder"
      rows="2"
      (input)="autoResize($event)"
      [disabled]="isSubmitting"
      class="comment-textarea"
    ></textarea>
  </div>

  <div class="error-message" *ngIf="error">
    <span class="icon">⚠️</span>
    {{ error }}
  </div>

  <div class="form-actions">
    <button
      type="button"
      class="btn btn-cancel"
      (click)="onCancel()"
      *ngIf="parentCommentId"
      [disabled]="isSubmitting"
    >
      <span class="icon">✕</span>
      {{ 'comments.cancel' | translate }}
    </button>

    <button
      type="submit"
      class="btn btn-primary"
      [disabled]="!content.trim() || isSubmitting"
    >
      <span *ngIf="!isSubmitting" class="btn-content">
        <span class="icon">{{ parentCommentId ? '↩' : '💬' }}</span>
        {{ parentCommentId ? ('comments.reply' | translate) : ('comments.submit' | translate) }}
      </span>
      <span *ngIf="isSubmitting" class="btn-loading">
        <span class="spinner"></span>
        {{ 'comments.submitting' | translate }}
      </span>
    </button>
  </div>
</form>
