<div class="edit-post-container" *ngIf="post">
  <h2>{{ 'post.edit.title' | translate }}</h2>

  <div *ngIf="error" class="error">{{ error }}</div>

  <label>
    {{ 'post.edit.content' | translate }}
    <textarea [(ngModel)]="content"></textarea>
  </label>

  <label>
    {{ 'post.edit.tags' | translate }}
    <input type="text" [(ngModel)]="tagsText" />
  </label>

  <label>
    <input type="checkbox" [(ngModel)]="isPublic" /> {{ 'post.edit.public' | translate }}
  </label>

  <div class="actions">
    <button (click)="save()" [disabled]="isLoading">Guardar</button>
    <button (click)="skip()" class="secondary">Omitir</button>
  </div>
</div>
