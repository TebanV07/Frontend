<article class="post-card">
  <div class="post-header">
    <div class="author-info">
      <img 
        [src]="post.user?.avatar || '/assets/default-avatar.png'" 
        [alt]="post.user?.username"
        class="avatar"
        [routerLink]="['/profile', post.user?.username]"
      >
      <div class="author-details">
        <a [routerLink]="['/profile', post.user?.username]" class="username">
          {{ post.user?.username }}
        </a>
        <span class="full-name" *ngIf="post.user?.first_name">
          {{ post.user?.first_name }} {{ post.user?.last_name }} 
        </span>
        <span class="timestamp">• {{ formattedDate }}</span>
      </div>
    </div>

    <div class="post-menu" *ngIf="isOwnPost">
      <button class="menu-button" (click)="toggleDropdown()">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="1"/><circle cx="12" cy="5" r="1"/><circle cx="12" cy="19" r="1"/>
        </svg>
      </button>

      <div class="dropdown-menu" *ngIf="showDropdown">
        <button (click)="editPost()">Edit</button>
        <button class="danger" (click)="deletePost()">Delete</button>
      </div>
    </div>
  </div>

  <div class="post-content">
    <p class="content-text">{{ post.content }}</p>

    <div class="media-container">
      <video 
        *ngIf="post.has_video && post.video_url" 
        [src]="post.video_url"
        controls
        class="media-video"
      ></video>
      
      <div *ngIf="post.has_images && post.images?.length" class="image-grid">
        <img 
          *ngFor="let image of post.images" 
          [src]="image.image_url" 
          [alt]="image.alt_text || 'Post image'"
          class="media-image"
        >
      </div>
    </div>
  </div>

  <div class="post-stats">
    <app-like-count 
      [postId]="post.id" 
      [likesCount]="post.likes_count"
    ></app-like-count>
    <span class="comment-count">{{ post.comments_count }} comments</span>
  </div>

  <div class="post-actions">
    <app-like-button
      [postId]="post.id"
      [isLiked]="post.isLiked || false"
      [likesCount]="post.likes_count"
      (likeToggled)="onLikeToggled($event)"
    ></app-like-button>

    <button class="action-button" [routerLink]="['/posts', post.id]">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
      <span>Comment</span>
    </button>

    <button class="action-button" (click)="sharePost()">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
        <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
      </svg>
      <span>Share</span>
    </button>
  </div>
</article>
