<div class="profile-tabs">
  <!-- Posts -->
  <button
    class="tab-btn"
    [class.active]="selectedTab === 'posts'"
    (click)="selectTab('posts')">
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <rect x="3" y="3" width="18" height="18" rx="2"/>
      <line x1="3" y1="9" x2="21" y2="9"/>
      <line x1="9" y1="21" x2="9" y2="9"/>
    </svg>
    <span>Posts</span>
    <span class="count" *ngIf="postsCount > 0">{{ postsCount }}</span>
  </button>

  <!-- Videos -->
  <button
    class="tab-btn"
    [class.active]="selectedTab === 'videos'"
    (click)="selectTab('videos')">
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <polygon points="23 7 16 12 23 17 23 7"/>
      <rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
    </svg>
    <span>Videos</span>
    <span class="count" *ngIf="videosCount > 0">{{ videosCount }}</span>
  </button>

  <!-- Me gusta -->
  <button
    class="tab-btn"
    [class.active]="selectedTab === 'liked'"
    (click)="selectTab('liked')">
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
    </svg>
    <span>Me gusta</span>
  </button>

  <!-- Guardados -->
  <button
    class="tab-btn"
    [class.active]="selectedTab === 'bookmarks'"
    (click)="selectTab('bookmarks')">
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
    </svg>
    <span>Guardados</span>
  </button>
</div>
