<div class="video-player-container">

  <!-- ── Elemento de video ── -->
  <video
    #videoElement
    class="video-element"
    [poster]="getThumbnailUrl()"
    [muted]="false"
    playsinline
    preload="metadata"
    crossorigin="anonymous"
    (click)="togglePlay()">

    <source [src]="getVideoUrl()" type="video/mp4">
    {{ 'videoPlayer.noSupport' | translate }}
  </video>

  <!-- ── Loading ── -->
  <div class="loading-overlay" *ngIf="isLoading">
    <div class="spinner-ring"></div>
    <p class="loading-text">{{ 'videoPlayer.loading' | translate }}</p>
  </div>

  <!-- ── Error ── -->
  <div class="error-overlay" *ngIf="hasError">
    <div class="error-content glass">
      <span class="error-icon">⚠️</span>
      <h3>{{ 'videoPlayer.error.title' | translate }}</h3>
      <p>{{ 'videoPlayer.error.subtitle' | translate }}</p>
      <button class="retry-btn" (click)="retryLoad()">
        {{ 'videoPlayer.error.retry' | translate }}
      </button>
    </div>
  </div>

  <!-- ── Play / Pause tap overlay ── -->
  <div
    class="play-pause-overlay"
    (click)="togglePlay()"
    *ngIf="!isLoading && !hasError">
    <div class="play-icon-wrap" *ngIf="!isPlaying">
      <svg width="72" height="72" viewBox="0 0 80 80">
        <circle cx="40" cy="40" r="40" fill="rgba(0,0,0,0.45)"/>
        <path d="M30 20 L30 60 L62 40 Z" fill="white"/>
      </svg>
    </div>
  </div>

  <!-- ── Progress bar ── -->
  <div class="progress-bar-wrap" *ngIf="!isLoading && !hasError">
    <div class="progress-track">
      <div class="progress-fill" [style.width.%]="progress"></div>
    </div>
  </div>

  <!-- ── Time + Volume ── -->
  <div class="player-bottom-bar" *ngIf="!isLoading && !hasError">
    <span class="time-display">{{ currentTimeFormatted }} / {{ durationFormatted }}</span>
    <button class="volume-btn" (click)="toggleMute()">
      <span *ngIf="!isMuted">🔊</span>
      <span *ngIf="isMuted">🔇</span>
    </button>
  </div>

</div>
