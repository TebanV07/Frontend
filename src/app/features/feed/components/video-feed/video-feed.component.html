<div class="video-feed-wrapper">

  <!-- ════════════════════════════
       BARRA DE FILTROS
  ════════════════════════════ -->
  <div class="filter-bar-standalone glass">
    <div class="dropdown-country">
      <span>🌐 Global</span>
      <span class="chevron">▾</span>
    </div>

    <div class="category-tabs">
      <span class="category-tab active">All</span>
      <span class="category-tab">Technology</span>
      <span class="category-tab">Design</span>
      <span class="category-tab">News</span>
    </div>

    <div class="ia-active-indicator">
      ⚡ IA Active
    </div>
  </div>

  <!-- ════════════════════════════
       LOADING INICIAL
  ════════════════════════════ -->
  <div class="loading-initial" *ngIf="isLoading && videos.length === 0">
    <div class="spinner-ring"></div>
    <p>{{ 'feed.loading' | translate }}</p>
  </div>

  <!-- ════════════════════════════
       FEED DE VIDEOS
  ════════════════════════════ -->
  <div class="video-player-container" *ngIf="hasVideos">

    <div
      class="video-item"
      *ngFor="let video of videos; let i = index"
      [class.active]="i === currentVideoIndex">

      <!-- Card vertical 9:16 -->
      <div class="vertical-video-card" *ngIf="i === currentVideoIndex">

        <app-video-player
          [video]="video"
          [isPlaying]="i === currentVideoIndex && isPlaying"
          (videoEnded)="onVideoEnded()">
        </app-video-player>

        <app-video-overlay
          [video]="video"
          (like)="onLike($event)"
          (comment)="onComment($event)"
          (share)="onShare($event)"
          (save)="onSave($event)"
          (requestTranslation)="onRequestTranslation($event.video, $event.language)">
        </app-video-overlay>

      </div>

    </div>

    <!-- Acciones laterales de navegación -->
    <div class="navigation-controls" *ngIf="hasVideos">
      <button
        class="nav-btn side-action-icon glass"
        [disabled]="currentVideoIndex === 0"
        (click)="previousVideo()">
        ↑
      </button>
      <button
        class="nav-btn side-action-icon glass"
        [disabled]="currentVideoIndex === videos.length - 1 && !hasMore"
        (click)="nextVideo()">
        ↓
      </button>
    </div>

  </div>

  <!-- Cargando más videos -->
  <div class="loading-more" *ngIf="isLoading && videos.length > 0">
    <div class="spinner-ring small"></div>
    <p>{{ 'feed.loadingMore' | translate }}</p>
  </div>

  <!-- Estado vacío -->
  <div class="empty-state" *ngIf="!isLoading && !hasVideos">
    <div class="empty-icon">🎥</div>
    <h3>{{ 'feed.empty.title' | translate }}</h3>
    <p>{{ 'feed.empty.subtitle' | translate }}</p>
    <button class="tool-btn upload-btn" routerLink="/upload">
      {{ 'feed.empty.upload' | translate }} →
    </button>
  </div>

</div>
