<div class="forgot-container">
  <div class="forgot-card">
    <h1>{{ 'auth.forgotPass.title' | translate }}</h1>
    <p class="subtitle">
      {{ 'auth.forgotPass.subtitle' | translate }}
    </p>

    <form (ngSubmit)="onSubmit()" *ngIf="!successMessage">
      <label for="email">{{ 'auth.forgotPass.emailLabel' | translate }}</label>
      <input
        id="email"
        type="email"
        name="email"
        [(ngModel)]="email"
        [placeholder]="'auth.forgotPass.emailPlaceholder' | translate"
        required
      />

      <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>

      <button type="submit" [disabled]="isLoading">
        {{ isLoading ? ('auth.forgotPass.sending' | translate) : ('auth.forgotPass.submit' | translate) }}
      </button>
    </form>

    <div *ngIf="successMessage" class="success-box">
      <p>{{ successMessage }}</p>
    </div>

    <a routerLink="/login" class="back-link">{{ 'auth.forgotPass.backToLogin' | translate }}</a>
  </div>
</div>
