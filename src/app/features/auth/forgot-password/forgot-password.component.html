<div class="forgot-container">
  <div class="forgot-card">
    <h1>Recuperar contraseña</h1>
    <p class="subtitle">
      Escribe el email de tu cuenta y te enviaremos un enlace para restablecer tu contraseña.
    </p>

    <form (ngSubmit)="onSubmit()" *ngIf="!successMessage">
      <label for="email">Email</label>
      <input
        id="email"
        type="email"
        name="email"
        [(ngModel)]="email"
        placeholder="tu@email.com"
        required
      />

      <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>

      <button type="submit" [disabled]="isLoading">
        {{ isLoading ? 'Enviando...' : 'Enviar enlace de recuperación' }}
      </button>
    </form>

    <div *ngIf="successMessage" class="success-box">
      <p>{{ successMessage }}</p>
    </div>

    <a routerLink="/login" class="back-link">Volver a iniciar sesión</a>
  </div>
</div>
