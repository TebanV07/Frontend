<div class="verification-required-container">
  <app-country-setup
    *ngIf="showCountrySetup"
    (completed)="onCountrySetupCompleted()">
  </app-country-setup>

  <div class="verification-required-card">
    <div class="card-icon">✉️</div>
    <h1>{{ 'auth.verifyRequired.title' | translate }}</h1>
    <p class="lead">
      {{ 'auth.verifyRequired.lead' | translate }}
    </p>

    <div class="email-box" *ngIf="user?.email">
      <span class="label">{{ 'auth.verifyRequired.registeredEmail' | translate }}</span>
      <strong>{{ user.email }}</strong>
    </div>

    <p class="hint">
      {{ 'auth.verifyRequired.hint' | translate }}
    </p>

    <p class="info" *ngIf="infoMessage">{{ infoMessage }}</p>
    <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>

    <div class="actions">
      <button type="button" class="primary" (click)="resendVerificationEmail()" [disabled]="isSending || isRefreshing">
        {{ isSending ? ('auth.verifyRequired.resending' | translate) : ('auth.verifyRequired.resend' | translate) }}
      </button>

      <button type="button" class="secondary" (click)="refreshVerificationStatus()" [disabled]="isRefreshing || isSending">
        {{ isRefreshing ? ('auth.verifyRequired.verifying' | translate) : ('auth.verifyRequired.alreadyVerified' | translate) }}
      </button>

      <button type="button" class="ghost" (click)="logout()">
        {{ 'auth.verifyRequired.logout' | translate }}
      </button>
    </div>
  </div>
</div>
