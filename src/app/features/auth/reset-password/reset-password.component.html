<div class="reset-container">
  <div class="reset-card" *ngIf="status === 'form'">
    <h1>Nueva contraseña</h1>
    <p class="subtitle">Ingresa tu nueva contraseña para completar la recuperación.</p>

    <form (ngSubmit)="onSubmit()">
      <label for="newPassword">Nueva contraseña</label>
      <input
        id="newPassword"
        type="password"
        name="newPassword"
        [(ngModel)]="newPassword"
        placeholder="Mínimo 8 caracteres"
        required
      />

      <label for="confirmPassword">Confirmar contraseña</label>
      <input
        id="confirmPassword"
        type="password"
        name="confirmPassword"
        [(ngModel)]="confirmPassword"
        placeholder="Repite la nueva contraseña"
        required
      />

      <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>

      <button type="submit" [disabled]="isLoading">
        {{ isLoading ? 'Actualizando...' : 'Guardar nueva contraseña' }}
      </button>
    </form>
  </div>

  <div class="reset-card success" *ngIf="status === 'success'">
    <h2>Contraseña restablecida</h2>
    <p>{{ successMessage }}</p>
    <a routerLink="/login" class="action-link">Ir a iniciar sesión</a>
  </div>

  <div class="reset-card error-card" *ngIf="status === 'error'">
    <h2>No se pudo restablecer</h2>
    <p>{{ errorMessage }}</p>
    <a routerLink="/forgot-password" class="action-link">Solicitar nuevo enlace</a>
  </div>
</div>
