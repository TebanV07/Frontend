<!-- post.component.html -->
<article class="post-card" *ngIf="post">
  <!-- ====== CABECERA ====== -->
  <div class="post-header">
    <div class="user-info">
      <img
        [src]="post.user?.avatar || 'https://ui-avatars.com/api/?name=' + (post.user?.username || 'User')"
        [alt]="post.user?.username || 'User'"
        class="user-avatar"
      />
      <div class="user-details">
        <h4 class="user-name">{{ post.user?.username }}</h4>
        <!-- ✅ MUESTRA EL IDIOMA ORIGINAL -->
        <span class="post-language" *ngIf="post.original_language">
          🌐 {{ getLanguageName(post.original_language) }}
        </span>
        <span class="timestamp">{{ getRelativeTime(post.created_at) }}</span>
      </div>
    </div>
    <button class="more-options">⋯</button>
  </div>

  <!-- ====== CONTENIDO ====== -->
  <div class="post-content">
    <p class="post-text">{{ post.content }}</p>

    <div *ngIf="post.has_video && post.video_url" class="video-container">
      <video [src]="post.video_url" controls class="post-video"></video>
    </div>

    <div *ngIf="post.has_images && post.images?.length" class="image-container">
      <img *ngFor="let image of post.images" [src]="image.image_url" class="post-image" />
    </div>
  </div>

  <!-- ====== ACCIONES ====== -->
  <div class="post-actions">
    <!-- Usamos el componente de likes-button -->
    <app-like-button
      [postId]="post.id"
      [isLiked]="post.isLiked ?? false"
      [likesCount]="post.likes_count"
      (likeToggled)="onLikeToggled($event)"
    ></app-like-button>
      <!-- 🔢 Contador de likes -->
    <app-like-count
      [postId]="post.id"
      [likesCount]="post.likes_count"
      [clickable]="true"
    ></app-like-count>

    <button class="action-button comment-btn" (click)="toggleComments()">
      💬 {{ post.comments_count }}
    </button>

    <button class="action-button share-btn">🌊 {{ post.shares_count }}</button>
  </div>

  <!-- ====== COMENTARIOS ====== -->
  <section *ngIf="showComments" class="post-comments">
    <!-- Componente de lista de comentarios -->
    <app-comment-list
      [postId]="post.id"
      [currentUserId]="currentUserId"
      (commentCreated)="onCommentCreated($any($event))"
    ></app-comment-list>
  </section>
</article>
